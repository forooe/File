            padding: 18px;
            margin: 12px 0;
            border-radius: 12px;

            border: 1px solid rgba(255, 255, 255, 0.1);

            display: flex;
            align-items: center;
            font-size: 1.05rem;
            line-height: 1.5;

        .option-item.wrong { background: #7f1d1d !important; border-color: var(--crimson) !important; color: #fff; }

        .feedback { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; background: #0f172a; border: 1px solid var(--gold); }

        .submit-trigger {
            width: 100%;
            padding: 25px;
            background: linear-gradient(45deg, var(--neon-green), #059669);
            color: #fff;
            border: none;
            border-radius: 20px;

function build() {
    const container = document.getElementById('quiz-flow');
    db.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="question-text">س${i+1}: ${item.q}</div>
        <div id="group-${i}">
            ${item.a.map((opt, oi) => `<div class="option-item" onclick="verify(${i}, ${oi})">${opt}</div>`).join('')}
            <div id="fb-${i}" class="feedback"></div>
        </div>`;
        container.appendChild(card);
    });
}

let score = 0;
function verify(qi, oi) {
    const grp = document.getElementById(`group-${qi}`);
    const items = grp.getElementsByClassName('option-item');
    if(grp.classList.contains('disabled')) return;

    if(oi === db[qi].c) {
        items[oi].classList.add('correct');
        score++;
        confetti({ particleCount: 20, spread: 40, origin: { y: 0.8 } });
    } else {
        items[oi].classList.add('wrong');
        items[db[qi].c].classList.add('correct');
        const fb = document.getElementById(`fb-${qi}`);
        fb.style.display = 'block';
        fb.innerHTML = `⚠️ <b style="color:var(--gold)">الإجابة النموذجية:</b> ${db[qi].a[db[qi].c]}`;
    }
    grp.classList.add('disabled');
}

function processResults() {
    window.scrollTo(0,0);
    document.getElementById('quiz-flow').style.display = 'none';
    document.getElementById('done-btn').style.display = 'none';
    const panel = document.getElementById('result-panel');
    panel.style.display = 'block';
    document.getElementById('final-score-box').innerText = `${score} / 90`;
    
    const t = document.getElementById('final-rank-title');
    const m = document.getElementById('final-msg');

    if(score === 90) {
        t.innerText = "👑 سُلطان الأحياء 👑";
        m.innerText = "أنت لا تدرس الأحياء، أنت تتقنها! درجة كاملة تدل على عقل جبار وتركيز فولاذي. فخور بك يا علي، لقد أثبتّ أنك الرقم الصعب.";
        launchBigConfetti();
    } else if(score >= 75) {
        t.innerText = "⚔️ المقاتل الذهبي ⚔️";
        m.innerText = "نتيجة مذهلة! أنت الآن من الصفوة. لقد اجتزت 90 سؤالاً بذكاء لافت. القليل من المراجعة للتعاريف وستصبح الأسطورة بلا منازع.";
    } else if(score >= 50) {
        t.innerText = "🔭 الساعي نحو القمة 🔭";
        m.innerText = "جهد محترم جداً. نتيجتك فوق المتوسطة وتدل على فهم جيد للفصل الثالث. راجع 'المنشأ' و'الوظائف' وستكتسح الاختبار القادم.";
    } else {
        t.innerText = "🕯️ محارب لا يستسلم 🕯️";
        m.innerText = "هذا الاختبار كان تحدياً صعباً، والنتيجة ليست إلا بداية لتعلم أعمق. راجع ملف الأستاذ ماهر بانت بتركيز أكبر، وعد إلينا أقوى.";
    }
}

function launchBigConfetti() {
    var end = Date.now() + (4 * 1000);
    (function frame() {
        confetti({ particleCount: 7, angle: 60, spread: 55, origin: { x: 0 } });
        confetti({ particleCount: 7, angle: 120, spread: 55, origin: { x: 1 } });
        if (Date.now() < end) requestAnimationFrame(frame);
    }());
}

window.onload = build;
</script>
